<mat-toolbar class="app-header" [class.sidebar-expanded]="sidebarExpanded">
  @if (!sidebarExpanded) {
    <app-brand-logo
      size="sm"
      theme="dark"
      [showMark]="false"
      [showWordmark]="true">
    </app-brand-logo>
  }

  <span class="spacer"></span>

  <time class="system-time" aria-live="polite">
    {{ systemTime() }}
  </time>

  <button mat-icon-button type="button" aria-label="Notifications" class="header-action">
    <mat-icon>notifications</mat-icon>
  </button>

  <button mat-button type="button" class="user-button" [matMenuTriggerFor]="userMenu">
    <mat-icon class="user-icon">account_circle</mat-icon>
    {{ displayName }}
    <mat-icon>arrow_drop_down</mat-icon>
  </button>

  <mat-menu #userMenu="matMenu">
    <a mat-menu-item routerLink="/app/profile">
      <mat-icon>person</mat-icon>
      <span>My Profile</span>
    </a>
    <button mat-menu-item type="button" (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>
</mat-toolbar>
