<h2 mat-dialog-title>Deposit</h2>

<mat-dialog-content>
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Account</mat-label>
    <input
      matInput
      type="text"
      name="accountSearch"
      [ngModel]="accountSearch()"
      (ngModelChange)="onAccountSearchChange($event)"
      [matAutocomplete]="accountAuto"
      [disabled]="!!preselectedAccount"
      placeholder="Type account number or customer..."
      autocomplete="off"
      required>

    <mat-autocomplete
      #accountAuto="matAutocomplete"
      [displayWith]="displayAccount.bind(this)"
      (optionSelected)="onAccountSelected($event.option.value)">
      @for (account of accountOptions(); track account.accountId) {
        <mat-option [value]="account">
          {{ displayAccount(account) }}
        </mat-option>
      }
      @if (accountOptions().length === 0) {
        <mat-option disabled>No matching accounts</mat-option>
      }
    </mat-autocomplete>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Amount</mat-label>
    <input
      matInput
      type="number"
      name="amount"
      [(ngModel)]="amount"
      min="0.01"
      step="0.01"
      required>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close()" [disabled]="saving()">
    Cancel
  </button>
  <button
    mat-flat-button
    color="primary"
    type="button"
    (click)="submit()"
    [disabled]="saving()">
    {{ saving() ? 'Depositing...' : 'Deposit' }}
  </button>
</mat-dialog-actions>
