<h2 mat-dialog-title>Opening deposit</h2>

<mat-dialog-content>
  <p class="policy-meta">
    {{ accountType }} · {{ currencyCode }}
    · Minimum {{ requiredOpeningDeposit }} {{ currencyCode }}
  </p>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Opening deposit amount</mat-label>
    <input
      matInput
      type="number"
      name="amount"
      [(ngModel)]="amount"
      [min]="requiredOpeningDeposit"
      step="0.01"
      required>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close()">Cancel</button>
  <button
    mat-flat-button
    color="primary"
    type="button"
    (click)="confirm()">
    Continue
  </button>
</mat-dialog-actions>
