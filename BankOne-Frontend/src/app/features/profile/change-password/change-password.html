<section class="change-password-page">
  <div class="page-header">
    <a class="back-link" routerLink="/app/profile">
      <mat-icon>arrow_back</mat-icon>
      Back to profile
    </a>
    <h1>Reset password</h1>
    <p>Enter your current password, then choose a new one (min. 8 characters).</p>
  </div>

  <mat-card class="section-card">
    <form class="password-form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline">
        <mat-label>Current password</mat-label>
        <input
          matInput
          name="currentPassword"
          [(ngModel)]="currentPassword"
          [type]="hideCurrent ? 'password' : 'text'"
          autocomplete="current-password"
          required>
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="hideCurrent = !hideCurrent">
          <mat-icon>{{ hideCurrent ? 'visibility' : 'visibility_off' }}</mat-icon>
        </button>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>New password</mat-label>
        <input
          matInput
          name="newPassword"
          [(ngModel)]="newPassword"
          [type]="hideNew ? 'password' : 'text'"
          autocomplete="new-password"
          required>
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="hideNew = !hideNew">
          <mat-icon>{{ hideNew ? 'visibility' : 'visibility_off' }}</mat-icon>
        </button>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Confirm new password</mat-label>
        <input
          matInput
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          [type]="hideConfirm ? 'password' : 'text'"
          autocomplete="new-password"
          required>
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="hideConfirm = !hideConfirm">
          <mat-icon>{{ hideConfirm ? 'visibility' : 'visibility_off' }}</mat-icon>
        </button>
      </mat-form-field>

      <div class="actions">
        <button
          mat-stroked-button
          type="button"
          routerLink="/app/profile">
          Cancel
        </button>
        <button
          mat-flat-button
          color="primary"
          type="submit"
          [disabled]="saving()">
          {{ saving() ? 'Updating...' : 'Update password' }}
        </button>
      </div>
    </form>
  </mat-card>
</section>
