@if (step === 'type') {
  <h2 mat-dialog-title>Create User</h2>

  <mat-dialog-content>
    <p class="helper-text">Who do you want to create?</p>

    <mat-radio-group [(ngModel)]="userType" class="type-group" name="userType">
      <mat-radio-button value="EMPLOYEE">Employee</mat-radio-button>
      <mat-radio-button value="CUSTOMER">Bank Customer</mat-radio-button>
    </mat-radio-group>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="close()">Cancel</button>
    <button mat-flat-button color="primary" type="button" (click)="continueToForm()">
      Continue
    </button>
  </mat-dialog-actions>
} @else {
  <h2 mat-dialog-title>Create Employee</h2>

  <mat-dialog-content>
    <form class="create-form">
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>First name</mat-label>
          <input matInput name="firstName" [(ngModel)]="firstName" required>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Last name</mat-label>
          <input matInput name="lastName" [(ngModel)]="lastName" required>
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Username</mat-label>
          <input matInput name="username" [(ngModel)]="username" required>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput type="password" name="password" [(ngModel)]="password" required>
        </mat-form-field>
      </div>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" name="email" [(ngModel)]="email" required>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Access level</mat-label>
        <mat-select name="accessLevel" [(ngModel)]="accessLevel" required>
          <mat-option value="ADMIN">
            Admin access — can create customers
          </mat-option>
          <mat-option value="NORMAL">
            Normal access — can view customers only
          </mat-option>
        </mat-select>
      </mat-form-field>
    </form>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="backToType()" [disabled]="saving">
      Back
    </button>
    <button mat-button type="button" (click)="close()" [disabled]="saving">
      Cancel
    </button>
    <button
      mat-flat-button
      color="primary"
      type="button"
      (click)="save()"
      [disabled]="saving">
      {{ saving ? 'Saving...' : 'Create Employee' }}
    </button>
  </mat-dialog-actions>
}
