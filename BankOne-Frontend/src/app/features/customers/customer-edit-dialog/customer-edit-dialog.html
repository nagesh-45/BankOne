<h2 mat-dialog-title>Edit Customer</h2>

<mat-dialog-content>
  <p class="helper-text">
    {{ customer.customerCode || (customer.customerId | businessId:'C') }}
  </p>

  <form class="edit-form">
    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>First name</mat-label>
        <input matInput name="firstName" [(ngModel)]="firstName" required>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Last name</mat-label>
        <input matInput name="lastName" [(ngModel)]="lastName" required>
      </mat-form-field>
    </div>

    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" name="email" [(ngModel)]="email" required>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Phone number</mat-label>
        <input
          matInput
          name="phoneNumber"
          [(ngModel)]="phoneNumber"
          maxlength="10"
          required>
      </mat-form-field>
    </div>

    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Date of birth</mat-label>
        <input matInput type="date" name="dateOfBirth" [(ngModel)]="dateOfBirth">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Status</mat-label>
        <mat-select name="status" [(ngModel)]="status" required>
          @for (item of statuses; track item) {
            <mat-option [value]="item">{{ item }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Address</mat-label>
      <textarea
        matInput
        name="address"
        [(ngModel)]="address"
        rows="2"
        required></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close()">Cancel</button>
  <button
    mat-flat-button
    color="primary"
    type="button"
    (click)="save()"
    [disabled]="saving()">
    {{ saving() ? 'Saving...' : 'Save changes' }}
  </button>
</mat-dialog-actions>
