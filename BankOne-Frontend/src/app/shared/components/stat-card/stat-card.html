<mat-card class="stat-card">

  <div class="card-header">

    <div class="icon-container" [style.background]="color">
      <mat-icon>{{ icon }}</mat-icon>
    </div>

    <div class="details">
      <div class="title">
        {{ title }}
      </div>

      <div class="value">
        {{ value }}
      </div>
    </div>

  </div>

</mat-card>
