<div
  class="brand-logo"
  [class.mark-only]="!showWordmark"
  [class.wordmark-only]="!showMark"
  [attr.data-theme]="theme"
  [attr.data-size]="size">

  @if (showMark) {
    <span class="mark" aria-hidden="true">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" focusable="false">
        <defs>
          <linearGradient [attr.id]="gradientId" x1="12" y1="4" x2="52" y2="60" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1E3A5F"/>
            <stop offset="100%" stop-color="#0B1F3A"/>
          </linearGradient>
        </defs>
        <rect width="64" height="64" rx="14" [attr.fill]="'url(#' + gradientId + ')'"/>
        <path
          fill="#C9A227"
          d="M32 10c-8.2 0-14.8 2.6-18.4 4.4-.7.4-1.1 1.1-1.1 1.9v18.3c0 8.7 5.9 16.5 14.7 19.6l4.1 1.4c.5.2 1 .2 1.4 0l4.1-1.4C45.5 51.1 51.4 43.3 51.4 34.6V16.3c0-.8-.4-1.5-1.1-1.9C46.8 12.6 40.2 10 32 10zm0 4.2c6.8 0 12.4 2.1 15.4 3.5v17c0 6.9-4.6 13.1-11.6 15.6L32 51.4l-3.8-1.1C21.2 47.8 16.6 41.6 16.6 34.7v-17c3-1.4 8.6-3.5 15.4-3.5z"/>
        <text
          x="32"
          y="41"
          text-anchor="middle"
          font-family="'Source Serif 4', Georgia, serif"
          font-size="26"
          font-weight="700"
          fill="#F5F1E8">1</text>
        <rect x="22" y="44.2" width="20" height="2.4" rx="1.2" fill="#C9A227"/>
      </svg>
    </span>
  }

  @if (showWordmark) {
    <div class="copy">
      <span class="wordmark">
        Bank<span class="accent">One</span>
      </span>
      @if (tagline) {
        <span class="tagline">{{ tagline }}</span>
      }
    </div>
  }
</div>
