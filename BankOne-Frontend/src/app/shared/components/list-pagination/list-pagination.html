@if (showControls) {
  <div class="list-pagination">
    <div class="page-info">
      Showing {{ from }}–{{ to }} of {{ totalElements }}
    </div>

    <div class="page-controls">
      <label class="size-label">
        Rows
        <select
          [ngModel]="pageSize"
          (ngModelChange)="onPageSizeChange($event)">
          @for (option of pageSizeOptions; track option) {
            <option [ngValue]="option">{{ option }}</option>
          }
        </select>
      </label>

      <div class="nav-group" role="group" aria-label="Page navigation">
        <button
          mat-icon-button
          type="button"
          class="nav-btn"
          [disabled]="pageIndex === 0"
          (click)="first()"
          aria-label="First page"
          title="First page">
          <mat-icon>first_page</mat-icon>
        </button>

        <button
          mat-icon-button
          type="button"
          class="nav-btn"
          [disabled]="pageIndex === 0"
          (click)="previous()"
          aria-label="Previous page"
          title="Previous page">
          <mat-icon>chevron_left</mat-icon>
        </button>

        <span class="page-number" aria-live="polite">
          {{ pageIndex + 1 }} / {{ totalPages || 1 }}
        </span>

        <button
          mat-icon-button
          type="button"
          class="nav-btn"
          [disabled]="pageIndex + 1 >= totalPages"
          (click)="next()"
          aria-label="Next page"
          title="Next page">
          <mat-icon>chevron_right</mat-icon>
        </button>

        <button
          mat-icon-button
          type="button"
          class="nav-btn"
          [disabled]="pageIndex + 1 >= totalPages"
          (click)="last()"
          aria-label="Last page"
          title="Last page">
          <mat-icon>last_page</mat-icon>
        </button>
      </div>

      <div class="goto-group">
        <input
          #pageInput
          class="page-input"
          type="number"
          min="1"
          [attr.max]="totalPages || 1"
          [value]="pageIndex + 1"
          aria-label="Go to page"
          title="Go to page"
          (keydown.enter)="goToPage(pageInput.value); $event.preventDefault()"
        />
        <button
          mat-icon-button
          type="button"
          class="nav-btn"
          (click)="goToPage(pageInput.value)"
          aria-label="Go to page"
          title="Go to page">
          <mat-icon>subdirectory_arrow_right</mat-icon>
        </button>
      </div>
    </div>
  </div>
}
