# Local full stack: Postgres + API + Angular (nginx)
# Usage:
#   cp .env.example .env
#   docker compose up --build
#
# API:  http://localhost:8080
# UI:   http://localhost:8081

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bankone}
      POSTGRES_USER: ${POSTGRES_USER:-bankone_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-BankOne@123}
    ports:
      - "5432:5432"
    volumes:
      - bankone_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bankone_user} -d ${POSTGRES_DB:-bankone}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./BankOne-BackEnd
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-bankone}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-bankone_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-BankOne@123}
      JWT_SECRET: ${JWT_SECRET:-ReplaceThisWithAVeryLongRandomSecretKeyAtLeast32CharactersLong}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
      PORT: 8080
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost:*,http://127.0.0.1:*}
    ports:
      - "8080:8080"

  web:
    build:
      context: ./BankOne-Frontend
      args:
        API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
    depends_on:
      - api
    ports:
      - "8081:80"

volumes:
  bankone_pg:
