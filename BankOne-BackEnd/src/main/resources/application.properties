spring.application.name=BankOne

# Override with env vars in cloud / Docker (see .env.example / docs/DEPLOY.md)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bankone}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bankone_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:BankOne@123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Instant/OffsetDateTime already serialize as ISO-8601 with Z (UTC).
# Do not set spring.jackson.serialization.write-dates-as-timestamps —
# Spring Boot 4 / Jackson 3 rejects that legacy property and the app fails to start.
spring.jackson.time-zone=UTC

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=false

# Cloud hosts often set PORT
server.port=${PORT:8080}

jwt.secret=${JWT_SECRET:ReplaceThisWithAVeryLongRandomSecretKeyAtLeast32CharactersLong}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Comma-separated origin patterns for CORS
app.cors.allowed-origin-patterns=${APP_CORS_ORIGINS:http://localhost:*,http://bankone.local:*,http://192.168.0.4:*}

logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LEVEL:DEBUG}
logging.level.org.hibernate.orm.jdbc.bind=${HIBERNATE_BIND_LEVEL:TRACE}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}
logging.level.org.springframework.web=${WEB_LOG_LEVEL:INFO}
